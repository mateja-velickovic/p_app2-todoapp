name: TodoApp | CI Workflow

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  
jobs:
  test-backend:
    name: Backend test executions

    runs-on: ubuntu-latest

    steps:
      - name: Cloning the repository
        uses: actions/checkout@v4

      - name: Node installation
        uses: actions/setup-node@v4
        with:
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Setup Backend
        run: cd backend && npm ci --prefer-offline

      - name: Package Audit
        run: cd backend && npm audit --audit-level critical

      - name: Lint the code
        run: cd backend && npm run lint

      - name: Unit tests
        run: cd backend && npx jest --coverage

      - name: Build coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: backend/coverage/cobertura-coverage.xml
          badge: true
          format: markdown
          output: both
          indicators: true
          fail_below_min: false

      - name: Publish coverage in job summary
        run: cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: |
            backend/coverage/
            backend/coverage/cobertura-coverage.xml
          if-no-files-found: error

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: backend/coverage/cobertura-coverage.xml
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN_BACKEND }}