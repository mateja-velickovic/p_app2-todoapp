name: TodoApp | Deploy Workflow

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  
jobs:
  push-backend-image:
    name: Build and push Docker backend image

    runs-on: ubuntu-latest

    steps:
      - name: Cloning the repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: meta
        run : |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "owner_lc=$OWNER_LC" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/todoapp-backend:latest
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/todoapp-backend:sha-${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push-frontend-image:
    name: Build and push Docker frontend image

    runs-on: ubuntu-latest

    steps:
      - name: Cloning the repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: meta
        run : |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "owner_lc=$OWNER_LC" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/todoapp-frontend:latest
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/todoapp-frontend:sha-${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to staging environment

    runs-on: ubuntu-latest
    needs:
      - push-backend-image
      - push-frontend-image

    steps:
      - name: Cloning the repository
        uses: actions/checkout@v4

      - name: Setup VPN and test connection
        uses: ./.github/actions/vpn
        with:
          host: "${{ secrets.VPN_IP }}"
          port: "443"
          username: "${{ secrets.VPN_USERNAME }}"
          password: "${{ secrets.VPN_PASSWORD }}"
          ping_host: ${{ secrets.SSH_TEST_HOST }}

      - name: Sending deployment files to the staging server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_TEST_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "./docker-compose.yaml,./docker-compose.staging.yaml,./deploy/**"
          target: ~/todoapp/
          port: 22

      - name: Deploying the application on the staging server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SSH_TEST_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd ~/todoapp
            docker compose -f docker-compose.yaml -f docker-compose.staging.yaml down
            docker compose -f docker-compose.yaml -f docker-compose.staging.yaml pull
            docker compose -f docker-compose.yaml -f docker-compose.staging.yaml up -d

  clean-images:
    name: Clean Docker images on VM

    runs-on: ubuntu-latest
    needs:
      - deploy-staging

    steps:
      - name: Cloning the repository
        uses: actions/checkout@v4

      - name: Setup VPN and test connection
        uses: ./.github/actions/vpn
        with:
          host: "${{ secrets.VPN_IP }}"
          port: "443"
          username: "${{ secrets.VPN_USERNAME }}"
          password: "${{ secrets.VPN_PASSWORD }}"
          ping_host: ${{ secrets.SSH_TEST_HOST }}

      - name: Running Docker images cleanup on staging server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SSH_TEST_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd ~/todoapp
            chmod +x ./deploy/scripts/clean-images.sh
            ./deploy/scripts/clean-images.sh