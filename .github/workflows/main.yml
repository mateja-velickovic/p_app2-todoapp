name: TodoApp | Developpment Workflow

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test-backend:
    name: Backend test executions

    runs-on: ubuntu-latest

    steps:
      - name: Cloning the repository
        uses: actions/checkout@v4

      - name: Node installation
        uses: actions/setup-node@v4
        with:
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Setup Backend
        run: cd backend && npm ci --prefer-offline

      - name: Package Audit
        run: cd backend && npm audit --audit-level critical

      - name: Lint the code
        run: cd backend && npm run lint

      - name: Unit tests
        run: cd backend && npm run test:ci

  deploy-staging:
    name: Deploy to staging environment

    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: Cloning the repository
        uses: actions/checkout@v4

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        run: docker build -t ghcr.io/${{ github.repository }}/todoapp-backend:latest ./backend

      - name: Push backend image to registry
        run: docker push ghcr.io/${{ github.repository }}/todoapp-backend:latest