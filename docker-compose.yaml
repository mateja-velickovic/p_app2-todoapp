services:
  mysql:
    image: mysql:lts
    container_name: mysql
    restart: unless-stopped
    hostname: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - back_network

  api:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: todoapp-backend
    restart: unless-stopped
    hostname: backend
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_DATABASE}
      PORT: 3000
    expose:
      - "3000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - front_network
      - back_network

  web:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: todoapp-frontend
    restart: unless-stopped
    hostname: frontend
    ports:
      - "5173:5173"
    depends_on:
      - api
    networks:
      - front_network

networks:
  front_network:
    driver: bridge
  back_network:
    driver: bridge

volumes:
  db_data: