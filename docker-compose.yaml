services:
  mysql:
    image: mysql:lts
    container_name: mysql
    restart: unless-stopped
    hostname: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - back_network

  api:
    image: ghcr.io/mateja-velickovic/todoapp-backend:latest
    container_name: todoapp-backend
    restart: unless-stopped
    hostname: backend
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      PORT: 3000
      DB_PORT: 3306
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app_network
      - back_network

  web:
    image: ghcr.io/mateja-velickovic/todoapp-frontend:latest
    container_name: todoapp-frontend
    restart: unless-stopped
    hostname: frontend
    depends_on:
      - api
    networks:
      - app_network

  caddy:
    image: caddy:2-alpine
    container_name: todoapp-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    depends_on:
      - web
      - api
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
  back_network:
    driver: bridge

volumes:
  db_data:
  caddy_data:
  caddy_config: